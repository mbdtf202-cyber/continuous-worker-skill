name: Release Continuous Worker Skill

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example continuous-worker-skill-v0.1.0)"
        required: false
        type: string
      publish_release:
        description: "Create or update a GitHub release"
        required: false
        default: false
        type: boolean
      clawhub_version:
        description: "Version for the generated ClawHub publish command"
        required: false
        type: string
  push:
    tags:
      - "continuous-worker-skill-v*"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate helper scripts
        run: |
          python3 skills/continuous-worker/scripts/test_init_task.py
          python3 skills/continuous-worker/scripts/test_render_progress.py
          bash test/release_continuous_worker_skill.sh

      - name: Build release artifacts
        env:
          RELEASE_TAG: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          REPO_NAME: ${{ github.repository }}
          CLAWHUB_VERSION: ${{ inputs.clawhub_version }}
        run: |
          set -euo pipefail
          ARGS=(--repo "$REPO_NAME")
          if [ -n "${RELEASE_TAG:-}" ]; then
            ARGS+=(--tag "$RELEASE_TAG")
          fi
          if [ -n "${CLAWHUB_VERSION:-}" ]; then
            ARGS+=(--clawhub-version "$CLAWHUB_VERSION")
          fi
          chmod +x ./scripts/release_continuous_worker_skill.sh
          ./scripts/release_continuous_worker_skill.sh "${ARGS[@]}"

      - name: Smoke import packaged skill
        env:
          HOME: ${{ runner.temp }}/continuous-worker-skill-home
          OPENCLAW_PROFILE: continuous-worker-skill-smoke
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          npm install -g openclaw@latest
          openclaw skills import "$PWD/dist/continuous-worker.skill" --replace
          openclaw skills info continuous-worker --json > "$RUNNER_TEMP/continuous-worker-skill-info.json"
          python3 - <<'PY' "$RUNNER_TEMP/continuous-worker-skill-info.json"
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          assert payload.get("name") == "continuous-worker", payload
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: continuous-worker-skill
          path: |
            dist/continuous-worker.skill
            dist/continuous-worker.skill.sha256
            dist/continuous-worker.README.md

      - name: Publish GitHub release assets
        if: github.event_name == 'push' || inputs.publish_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          files: |
            dist/continuous-worker.skill
            dist/continuous-worker.skill.sha256
            dist/continuous-worker.README.md
          body_path: dist/continuous-worker.README.md
          generate_release_notes: true
