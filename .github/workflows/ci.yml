name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Package skill
        run: |
          python3 scripts/package_skill.py skills/continuous-worker dist
          test -f dist/continuous-worker.skill
